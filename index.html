<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRANSHUMANISM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#000,#071326,#00c3ff);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,#00eaff33 2px,transparent 2px);
    background-size:40px 40px;
    animation:move 15s linear infinite;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(-150px,-150px);}
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    background:rgba(0,0,0,.45);
    border:1px solid #00eaff;
    text-align:center;
    box-shadow:0 0 30px #00eaff66;
}

h1{
    color:#00eaff;
    margin-bottom:15px;
    text-shadow:0 0 20px #00eaff;
}

p{
    color:#d7f8ff;
    line-height:1.7;
}

button{
    margin-top:25px;
    padding:14px 28px;
    border:none;
    border-radius:40px;
    background:#00eaff;
    color:#000;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #00eaff;
}
</style>
</head>

<body>

<div class="card">
<h1>TRANSHUMANISM</h1>

<p>
Beyond biology.<br>
Technology, intelligence, and the future of humanity.
</p>

<button onclick="showMessage()">
ENTER
</button>

</div>

<script>
function showMessage(){
alert("Welcome to the future.");
}
</script>

</body>
</html>
